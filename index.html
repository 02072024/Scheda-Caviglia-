eve_lsi'); lsi('all_aff','all_ctrl','all_lsi'); lsi('ta_aff','ta_ctrl','ta_lsi'); lsi('sol_aff','sol_ctrl','sol_lsi'); lsi('gem_aff','gem_ctrl','gem_lsi'); lsi('calf_aff','calf_ctrl','calf_lsi'); percDiff('f2_cop_aff','f2_cop_ctrl','f2_cop_diff'); lsi('imtp_aff','imtp_ctrl','imtp_lsi'); lsi('cmj_aff','cmj_ctrl','cmj_lsi'); lsi('side_aff','side_ctrl','side_lsi'); lsiInverseTime('square_aff','square_ctrl','square_lsi'); evaluate();}%0Afunction serialize(){const obj={}; [...form.elements].forEach(el=%3E{if(!el.name) return; if(el.type==='checkbox') obj[el.name]=el.checked; else if(el.type==='radio'){if(el.checked) obj[el.name]=el.value; else if(!(el.name in obj)) obj[el.name]='';} else obj[el.name]=el.value;}); return obj;}%0Afunction renderChecks(targetId, arr){const box=document.getElementById(targetId); box.innerHTML=''; arr.forEach(item=%3E{const div=document.createElement('div'); div.className='criterion '+(item.ok===true?'ok':item.ok===false?'bad':'mid'); div.innerHTML=`%3Cdiv class=%22criterion-title%22%3E${item.label}%3C/div%3E%3Cdiv class=%22criterion-meta%22%3E${item.meta}%3C/div%3E`; box.appendChild(div);});}%0Afunction criterion(label, ok, meta){return {label,ok,meta};}%0Afunction allGood(arr){return arr.every(x=%3Ex.ok===true);} function someData(arr){return arr.some(x=%3Ex.ok!==null);} %0Afunction setCard(elId,text,state){const el=document.getElementById(elId); const card=el.parentElement; el.textContent=text; card.classList.remove('ok','bad','mid'); card.classList.add(state);}%0Afunction evaluate(){%0A  const f1=[%0A    criterion('NRS deambulazione', n('f1_nrs')===null?null:n('f1_nrs')===0, n('f1_nrs')===null?'Inserire NRS':'Target: 0'),%0A    criterion('Figure of 8', n('f1_fig_diff')===null?null:n('f1_fig_diff')%3C=1.0, n('f1_fig_diff')===null?'Inserire misure':'Target: Δ ≤ 1.0 cm'),%0A    criterion('ROM passivo + attivo', (t('f1_rom_pass')===''||t('f1_rom_att')==='')?null:(t('f1_rom_pass')==='Simmetrico'%26%26t('f1_rom_att')==='Simmetrico'), 'Target: e ti. Il paziente è idoneo al passaggio al programma di consolidamento / ritorno all’attività.';}%0A  document.getElementById('sumNext').textContent=next; document.getElementById('finalNext').textContent=next; document.getElementById('clinicalDecision').textContent=decision;%0A}%0Afunction restoreCurrent(){try{const raw=localStorage.getItem(KEY); if(!raw) return false; const data=JSON.parse(raw); Object.entries(data).forEach(([k,v])=%3E{const nodes=form.querySelectorAll(`[name=%22${k}%22]`); nodes.forEach(el=%3E{if(el.type==='checkbox') el.checked=!!v; else if(el.type==='radio') el.checked=(el.value===v); else el.value=v;});}); recalc(); return true;}catch(e){return false;}}%0Afunction clearOldData(){try{oldKeys.forEach(k=%3ElocalStorage.removeItem(k));}catch(e){}}%0Afunction clearSavedTemplate(){return;}%0Afunction newScheda(){if(!confirm('Vuoi svuotare tutti i campi della scheda corrente?')) return; form.reset(); recalc(); statusEl.textContent='Scheda svuotata. Nessun dato precompilato.';}%0AclearOldData(); form.reset(); recalc(); form.addEventListener('input',recalc); window.addEventListener('beforeprint',recalc);%0A%3C/script%3E%0A%3C/body%3E%0A%3C/html%3E%0A" download="index.html">Download index.html</a></div></body></html>
